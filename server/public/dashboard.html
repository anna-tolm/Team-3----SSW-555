<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Coach | Welcome</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <h1 class="dashboard-title">AI Personal Health Coach</h1>
        <a class="site-logo-link" data-profile-link href="/profile.html" aria-label="Go to profile">
          <img class="site-logo" src="/logo.png" alt="Health Coach logo" />
        </a>
      </header>
      </main>

      <hr class="full-divider">

      <main class="wrap">
      <p class="dash-subheading">Track your progress, set goals, and get AI-powered guidance.</p>

      <section class="card">
        <h2>Get Started</h2>
        <p>Create an account to start logging your health data and get personalized recommendations.</p>
        <div style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem;">
          <button type="button" onclick="window.location.href = '/signup.html'">
            Sign Up
          </button>
          <button type="button" class="secondary" onclick="window.location.href = '/login.html'">
            Log In
          </button>
        </div>
      </section>

      <section class="card">
        <h2>Already exploring?</h2>
        <p>You can still access the prototype dashboard while we wire up signup and login.</p>
        <button type="button" onclick="window.location.href = '/index.html'">
          View Demo Dashboard
        </button>
      </section>
    </main>
    <script src="/profileLink.js"></script>
  </body>
</html>
