<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Fitness Tracker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <h1>Welcome, Shane</h1>
      </header>

      <section class="card">
        <h2>Done this week</h2>
        <ul>
          <li><strong>Workouts:</strong> 3</li>
          <li><strong>Total time:</strong> 120 minutes</li>
          <li><strong>Streak:</strong> 2 days</li>
        </ul>
      </section>

      <section class="card">
        <h2>Left to do</h2>
        <ul>
          <li><strong>Workouts remaining:</strong> 2</li>
          <li><strong>Next workout:</strong> Upper Body</li>
          <li><strong>Goal focus:</strong> Muscle Growth</li>
        </ul>
      </section>

      <section class="card">
        <h2>Actions</h2>
        <button type="button" onclick="alert('Generate workout')">Generate Workout</button>
        <button type="button" class="secondary" onclick="alert('Chat with AI')">
          Talk to AI Agent
        </button>
        <button type="button" class="secondary" onclick="window.location.href = '/profile.html'">
          View Profile
        </button>
      </section>
    </main>
  </body>
</html>
