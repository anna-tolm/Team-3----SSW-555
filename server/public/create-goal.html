<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Goal</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/chat/chat.css" />
    <style>
      .profile-nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 0.65rem;
        margin-bottom: 1rem;
        margin-top: 1rem;
        padding: 0.65rem 0.85rem;
        border-radius: 0.75rem;
        border: 2px solid var(--outline);
        background: rgba(255, 255, 255, 0.35);
      }
      .profile-nav .nav-pill {
        display: inline-block;
        margin: 0;
        padding: 0.4rem 1rem;
        border-radius: 999px;
        border: 2px solid var(--outline);
        background: transparent;
        color: var(--outline);
        cursor: pointer;
        font-size: 0.82rem;
        font-weight: bold;
        text-decoration: none;
        transition: all 0.2s ease;
        font-family: inherit;
        box-sizing: border-box;
      }
      .profile-nav .nav-pill:hover {
        background: var(--outline);
        color: #ededf3;
        transform: translateY(-1px);
      }
      .profile-nav .nav-pill.secondary {
        background: #1d1b1b;
        color: #ededf3;
      }
      .profile-nav .nav-pill.secondary:hover {
        opacity: 0.92;
        transform: translateY(-1px);
      }

      .goal-json-card {
        border: 2px solid var(--outline);
        border-radius: 0.75rem;
        padding: 0.9rem;
        margin-top: 0.75rem;
        background: rgba(2, 6, 23, 0.85);
        color: #e5e7eb;
      }
      .goal-json-actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }
      .btn {
        padding: 0.5rem 1.1rem;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }
      .btn-primary {
        background: linear-gradient(135deg, #38bdf8, #4f46e5);
        color: white;
      }
      .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.25);
        color: #e5e7eb;
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .goal-json-card pre {
        margin: 0.5rem 0 0 0;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .goal-json-card code,
      #goalJsonCode {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.9rem;
      }

      .create-goal-page {
        padding-bottom: 11rem;
        max-width: 900px;
        margin-left: auto;
        margin-right: auto;
      }
      .create-goal-page #chatWindow {
        height: auto;
        max-height: min(48vh, 380px);
        min-height: 180px;
        overflow-y: auto;
        padding: 10px;
        padding-bottom: 80px;
        margin-bottom: 0.5rem;
        border-radius: 0.75rem;
        border: 0;
        background: transparent;
      }
      .create-goal-page .goal-json-card {
        margin-top: 1rem;
        margin-bottom: 0.5rem;
        max-height: min(42vh, 360px);
        overflow-y: auto;
        position: relative;
        z-index: 1;
        scroll-margin-bottom: 8rem;
      }
      .create-goal-page .goal-json-actions {
        position: sticky;
        bottom: 0;
        padding-top: 0.75rem;
        margin-top: 0.25rem;
        background: linear-gradient(to top, rgba(2, 6, 23, 0.98) 70%, transparent);
      }
      .create-goal-page .input {
        z-index: 2;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="container create-goal-page">
      <nav class="profile-nav" aria-label="Create goal navigation">
        <a href="/profile.html" class="nav-pill secondary" id="goalProfileLink">View Profile</a>
        <a href="/create-goal.html" class="nav-pill secondary" id="createGoalSelfLink">Create Goal</a>
        <a href="/chat/chat.html" class="nav-pill secondary" id="goalChatLink">Talk to AI Agent</a>
        <a class="site-logo-link" data-profile-link href="/profile.html" aria-label="Go to profile">
          <img class="site-logo" src="/logo.png" alt="Health Coach logo" />
        </a>
      </nav>

      <div class="title" id="titleType">
        <h1>Create a Goal Plan</h1>
      </div>

      <div class="chat-window" id="chatWindow"></div>

      <div class="goal-json-card" id="goalJsonCard" style="display:none;">
        <strong>Goal JSON (ready to save)</strong>
        <pre><code id="goalJsonCode"></code></pre>
        <div class="goal-json-actions">
          <button class="btn btn-primary" id="approveBtn" disabled>Approve & Save Goal</button>
          <button class="btn btn-secondary" id="copyJsonBtn" disabled>Copy JSON</button>
        </div>
        <div id="saveStatus" style="margin-top:0.6rem; font-size:0.9rem;"></div>
      </div>

      <div class="input">
        <textarea id="messageInput" placeholder="Describe your goal (e.g. 'I want a vegetarian meal plan to lose 10 lbs in 8 weeks')..."></textarea>
        <button id="sendBtn">Send</button>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/lib/marked.umd.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
      <script src="/profileLink.js"></script>
      <script src="/createGoalScript.js"></script>
    </div>
  </body>
</html>
