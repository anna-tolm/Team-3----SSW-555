<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e5e7eb;
        margin: 0;
      }
      main {
        max-width: 800px;
        margin: 2rem auto;
        padding: 1.5rem;
      }
      .card {
        background: rgba(15, 23, 42, 0.9);
        border-radius: 0.75rem;
        padding: 1.5rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(148, 163, 184, 0.3);
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.75rem;
      }
      .muted {
        color: #9ca3af;
        font-size: 0.9rem;
      }
      .field {
        margin: 0.25rem 0;
      }
      .field strong {
        display: inline-block;
        min-width: 120px;
      }
      .biometrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 0.5rem 1rem;
        margin-top: 0.75rem;
      }
      .pill {
        display: inline-block;
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
        background: rgba(56, 189, 248, 0.1);
        border: 1px solid rgba(56, 189, 248, 0.3);
        font-size: 0.75rem;
      }
      .error {
        color: #fecaca;
        margin-top: 0.5rem;
        font-size: 0.9rem;
      }
      .back-btn {
        display: inline-block;
        margin-bottom: 1rem;
        padding: 0.4rem 0.9rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.5);
        background: transparent;
        color: #94a3b8;
        cursor: pointer;
        font-size: 0.9rem;
        text-decoration: none;
      }
      .back-btn:hover {
        background: rgba(148, 163, 184, 0.15);
        color: #e5e7eb;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <a href="/" class="back-btn">← Back to main</a>
        <div id="error" class="error" aria-live="polite"></div>

        <h1 id="nameHeading">User profile</h1>
        <div class="muted" id="emailLine"></div>

        <div id="bioSection" style="margin-top: 1rem;">
          <div class="field">
            <strong>Joined:</strong> <span id="joined"></span>
          </div>
        </div>

        <section style="margin-top: 1.25rem;">
          <h2 style="font-size: 1.1rem; margin-bottom: 0.3rem;">Biometrics</h2>
          <div class="muted" id="bioEmptyNote">No biometrics saved yet.</div>
          <div class="biometrics-grid" id="biometricsGrid"></div>
        </section>
      </div>
    </main>

    <script>
      async function fetchUser(id) {
        const res = await fetch('/users/' + encodeURIComponent(id));
        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || 'Request failed with ' + res.status);
        }
        return res.json();
      }

      function renderProfile(user) {
        const nameHeading = document.getElementById('nameHeading');
        const emailLine = document.getElementById('emailLine');
        const joinedEl = document.getElementById('joined');
        const bioEmptyNote = document.getElementById('bioEmptyNote');
        const bioGrid = document.getElementById('biometricsGrid');

        nameHeading.textContent = user.name || 'User profile';
        emailLine.textContent = user.email ? 'Email: ' + user.email : '';

        if (user.dateJoined) {
          const d = new Date(user.dateJoined);
          joinedEl.textContent = d.toLocaleDateString();
        } else {
          joinedEl.textContent = '—';
        }

        bioGrid.innerHTML = '';
        if (!user.biometrics) {
          bioEmptyNote.style.display = 'block';
          return;
        }

        bioEmptyNote.style.display = 'none';
        const entries = Object.entries(user.biometrics);
        for (const [key, value] of entries) {
          if (value === null || value === undefined || value === '') continue;
          const item = document.createElement('div');
          item.className = 'field';
          const label = key.replace(/([A-Z])/g, ' $1').replace(/^./, (c) => c.toUpperCase());
          let display = value;

          if (Array.isArray(value)) {
            display = value.join(', ');
          } else if (typeof value === 'object') {
            display = Object.entries(value)
              .filter(([, v]) => v)
              .map(([k]) => k)
              .join(', ');
          }

          item.innerHTML = '<strong>' + label + ':</strong> <span>' + display + '</span>';
          bioGrid.appendChild(item);
        }
      }

      // If ?id=<userId> is present, load that profile.
      (function init() {
        const params = new URLSearchParams(window.location.search);
        const idFromQuery = params.get('id');
        if (idFromQuery) {
          fetchUser(idFromQuery)
            .then(renderProfile)
            .catch((err) => {
              const errorEl = document.getElementById('error');
              errorEl.textContent = 'Could not load user: ' + err.message;
            });
        } else {
          const errorEl = document.getElementById('error');
          errorEl.textContent = 'No user specified. Please log in first.';
        }
      })();
    </script>
  </body>
</html>
