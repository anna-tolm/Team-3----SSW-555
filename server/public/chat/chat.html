<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Health Coach Chat</title>
        <link rel="stylesheet" href="/styles.css" />
        <link rel="stylesheet" href="/chat/chat.css" />
        <style>
          .profile-nav {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem 0.65rem;
            margin-bottom: 1rem;
            margin-top: 1rem;
            padding: 0.65rem 0.85rem;
            border-radius: 0.75rem;
            border: 2px solid var(--outline);
            background: rgba(255, 255, 255, 0.35);
          }

          .profile-nav .nav-pill {
            display: inline-block;
            margin: 0;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            border: 2px solid var(--outline);
            background: transparent;
            color: var(--outline);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s ease;
            font-family: inherit;
            box-sizing: border-box;
          }

          .profile-nav .nav-pill:hover {
            background: var(--outline);
            color: #ededf3;
            transform: translateY(-1px);
          }

          .profile-nav .nav-pill.secondary {
            background: #1d1b1b;
            color: #ededf3;
          }

          .profile-nav .nav-pill.secondary:hover {
            opacity: 0.92;
            transform: translateY(-1px);
          }
        </style>
    </head>
    <body>
      <div class="container">
        <nav class="profile-nav" aria-label="Chat navigation">
          <a href="/profile.html" class="nav-pill secondary" id="chatProfileLink">View Profile</a>
          <button type="button" class="nav-pill" onclick="alert('AI Coach creates a plan for achieving a user given goal in specific json format, and saves it to profile and goals database.')">Create Goal</button>
          <!-- We should have this "Create Goal" button instead of a "Generate Workout" button, so the "Talk to AI Agent" button fields general questions,
          meanwhile the "Create Goal" button can take in a specific user goal, output the necessary workout or diet plan, and save it to profile and DB -->
          <a href="/chat/chat.html" class="nav-pill secondary" id="chatSelfLink">Talk to AI Agent</a>
        </nav>
        <div class="title" id="titleType">
            <h1>Your Health Coach</h1>
        </div>
 <!-- where messages appear -->
    <div class="chat-window" id="chatWindow"></div>

    <!-- user input area -->
    <div class="input">
      <textarea id="messageInput" placeholder="Ask your health coach..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="chatScript.js"></script>
    </div>
  </body>
</html>
